version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
        - name: unused-parameter
          disabled: true

formatters:
  enable:
    - gofmt